services:
  postgres:
    image: postgres:16-alpine
    container_name: obsidianragengine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ObsidianNotes
    ports:
      - "6201:5432"
    volumes:
      - obsidianragengine-postgres-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: obsidianragengine-qdrant
    restart: unless-stopped
    ports:
      - "6202:6333"
      - "6203:6334"
    volumes:
      - obsidianragengine-qdrant-data:/qdrant/storage

volumes:
  obsidianragengine-postgres-data:
  obsidianragengine-qdrant-data:
